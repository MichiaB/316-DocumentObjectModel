<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title> The Audacity Oracle </title>
  </head>
  <body>
    <!-- Fortune Teller Background image -->
    <div class="ft-container">
      <img src="img/ft.jpg" alt="Fortune Teller" />

      <div class="container">
        <div class="bgColor"></div>
        <div class="bgColor"></div>
        <div class="bgColor"></div>
        <div class="bgColor"></div>
        <div class="bgColor"></div>
        <div class="content">
          <h1> The Audacity Oracle  </h1>
          <br>

          <h4>Telling fortunes and hurting feelings since 1952.</h4>
          <br>

          <!-- Question Box -->
          <input
            type="text"
            id="question"
            placeholder="Ask a Question"
            required
          />
          <br />
          <br />
          <button class="Fortune" type="button">Know Your Fortune</button>
          <br />
          <br />
          <div id="output"></div>
        </div>
      </div>
    </div>
    <script src="index.js" defer></script>
  </body>
</html>
